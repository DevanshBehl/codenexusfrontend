# ============================================================
# CodeNexus Core Services — Always Running
# ============================================================

services:
  db:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-devanshbehl}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-devansh}
      POSTGRES_DB: ${DB_NAME:-codenexus}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-devanshbehl} -d ${DB_NAME:-codenexus}"]
      interval: 5s
      timeout: 3s
      retries: 10

  app-redis:
    image: redis:7-alpine
    container_name: app_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - app-redis-data:/data

  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: codenexus-backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      NODE_ENV: production
      PORT: "8000"
      DATABASE_URL: postgres://${DB_USER:-devanshbehl}:${DB_PASSWORD:-devansh}@db:5432/${DB_NAME:-codenexus}
      JWT_SECRET: ${JWT_SECRET:-devanshbhel}
      REDIS_URL: redis://app-redis:6379
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
    depends_on:
      db:
        condition: service_healthy
      app-redis:
        condition: service_started
    volumes:
      - uploads-data:/app/uploads
    networks:
      - app-net

  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
    container_name: codenexus-frontend
    restart: always
    ports:
      - "5173:5173"
    environment:
      NODE_ENV: production
      VITE_API_URL: /api
    depends_on:
      - backend
    networks:
      - app-net

networks:
  app-net:
    driver: bridge

volumes:
  pgdata:
  app-redis-data:
  uploads-data:
